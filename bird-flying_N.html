<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 날리기 연습</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f8ff; text-align: center; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        
        /* 게임 화면 테두리와 배경 */
        #gameArea { position: relative; width: 400px; height: 500px; background-color: #70c5ce; margin: 20px auto; border: 4px solid #2c3e50; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border-radius: 10px; cursor: pointer; }
        
        /* 새 모양 (이모티콘 사용) */
        #bird { position: absolute; width: 40px; height: 40px; font-size: 35px; line-height: 40px; left: 50px; top: 200px; z-index: 10; user-select: none; }
        
        /* 장애물(기둥) 스타일 */
        .pipe { position: absolute; width: 60px; background-color: #73bf2e; border: 3px solid #558c22; z-index: 5; }
        .pipe-top { top: 0; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; }
        .pipe-bottom { bottom: 0; border-top-left-radius: 5px; border-top-right-radius: 5px; }
        
        /* 점수판 및 시작화면 */
        #scoreBoard { font-size: 28px; font-weight: bold; color: #2c3e50; margin-top: 20px; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #startScreen h2 { margin: 0 0 15px 0; font-size: 30px; }
        .back-btn { display: inline-block; padding: 12px 25px; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .back-btn:hover { background: #34495e; }
    </style>
</head>
<body>
    <div id="scoreBoard">점수: 0</div>
    
    <div id="gameArea">
        <div id="bird">🐦</div>
        <div id="startScreen">
            <h2>새 날리기 연습</h2>
            <p>화면을 클릭하면 새가 점프합니다!</p>
            <p style="font-size: 0.9em; color: #ccc;">(마우스 클릭 연습에 좋습니다)</p>
        </div>
    </div>
    
    <a href="index.html" class="back-btn">메인으로 돌아가기</a>

    <script>
        const gameArea = document.getElementById('gameArea');
        const bird = document.getElementById('bird');
        const startScreen = document.getElementById('startScreen');
        const scoreBoard = document.getElementById('scoreBoard');

        let isGameOver = true;
        let score = 0;
        let birdY = 200;
        let birdVelocity = 0;
        let gravity = 0.5; // 떨어지는 속도
        let jumpPower = -8; // 점프하는 힘
        let pipes = [];
        let gameLoop;
        let pipeSpawner;

        // 마우스를 클릭하거나 화면을 터치했을 때 점프
        gameArea.addEventListener('mousedown', jump);
        gameArea.addEventListener('touchstart', jump);

        function jump(e) {
            e.preventDefault();
            if (isGameOver) {
                startGame(); // 게임 오버 상태면 게임 시작
            } else {
                birdVelocity = jumpPower; // 게임 중이면 점프
            }
        }

        function startGame() {
            isGameOver = false;
            score = 0;
            birdY = 200;
            birdVelocity = 0;
            scoreBoard.innerText = "점수: 0";
            startScreen.style.display = 'none';
            
            // 화면에 남아있는 기둥들 청소
            pipes.forEach(p => {
                if(p.top.parentNode) p.top.parentNode.removeChild(p.top);
                if(p.bottom.parentNode) p.bottom.parentNode.removeChild(p.bottom);
            });
            pipes = [];

            gameLoop = setInterval(update, 20);
            pipeSpawner = setInterval(createPipe, 1500); // 1.5초마다 새 기둥 생성
        }

        function createPipe() {
            if (isGameOver) return;
            let gap = 150; // 위아래 기둥 사이의 틈(이 틈으로 지나가야 함)
            let minHeight = 50;
            let maxTopHeight = gameArea.clientHeight - gap - minHeight;
            let topHeight = Math.floor(Math.random() * (maxTopHeight - minHeight + 1) + minHeight);
            let bottomHeight = gameArea.clientHeight - topHeight - gap;

            let pipeTop = document.createElement('div');
            pipeTop.className = 'pipe pipe-top';
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.left = '400px';

            let pipeBottom = document.createElement('div');
            pipeBottom.className = 'pipe pipe-bottom';
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.left = '400px';

            gameArea.appendChild(pipeTop);
            gameArea.appendChild(pipeBottom);

            pipes.push({ x: 400, top: pipeTop, bottom: pipeBottom, passed: false });
        }

        function update() {
            // 1. 새의 움직임 계산
            birdVelocity += gravity;
            birdY += birdVelocity;
            bird.style.top = birdY + 'px';

            // 바닥이나 천장에 부딪히면 게임 오버
            if (birdY > 460 || birdY < 0) {
                gameOver();
            }

            // 2. 장애물(기둥) 이동 및 충돌 계산
            pipes.forEach((p, index) => {
                p.x -= 3; // 기둥이 다가오는 속도
                p.top.style.left = p.x + 'px';
                p.bottom.style.left = p.x + 'px';

                // 파이프를 무사히 지나치면 점수 1점 획득
                if (p.x < 50 && !p.passed) {
                    score++;
                    scoreBoard.innerText = "점수: " + score;
                    p.passed = true;
                }

                // 부딪혔는지 확인하는 충돌 로직
                let birdRect = { top: birdY + 5, bottom: birdY + 35, left: 55, right: 85 };
                let topPipeRect = { top: 0, bottom: parseFloat(p.top.style.height), left: p.x, right: p.x + 60 };
                let bottomPipeRect = { top: gameArea.clientHeight - parseFloat(p.bottom.style.height), bottom: gameArea.clientHeight, left: p.x, right: p.x + 60 };

                if (isCollide(birdRect, topPipeRect) || isCollide(birdRect, bottomPipeRect)) {
                    gameOver();
                }

                // 화면 왼쪽 밖으로 완전히 나간 기둥은 메모리에서 삭제
                if (p.x < -60) {
                    p.top.parentNode.removeChild(p.top);
                    p.bottom.parentNode.removeChild(p.bottom);
                    pipes.splice(index, 1);
                }
            });
        }

        // 박스끼리 겹쳤는지(충돌했는지) 수학적으로 확인하는 함수
        function isCollide(a, b) {
            return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            clearInterval(pipeSpawner);
            startScreen.style.display = 'flex';
            startScreen.innerHTML = `<h2>게임 오버! 💥</h2><p>최종 점수: ${score}점</p><p style="margin-top:20px; font-size:16px;">화면을 클릭하면 다시 시작합니다</p>`;
        }
    </script>
</body>
</html>
