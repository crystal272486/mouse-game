<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼삼오오 클릭 - forever.or.kr</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 5px; color: #ecf0f1; }
        p { color: #bdc3c7; font-size: 0.9em; margin-bottom: 20px; }
        
        /* 점수판 및 상단 바 */
        .header-bar { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 20px; }
        .score-box { font-size: 1.5em; font-weight: bold; color: #f1c40f; background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 8px; }
        .restart-btn { padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1em; }
        .restart-btn:hover { background: #c0392b; }

        /* 게임 보드 (가로 15칸, 세로 10칸) */
        #board { 
            display: grid; 
            grid-template-columns: repeat(15, 35px); 
            grid-template-rows: repeat(10, 35px); 
            gap: 2px; 
            justify-content: center; 
            background: #34495e; 
            padding: 10px; 
            border-radius: 10px; 
            width: max-content; 
            margin: 0 auto; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        /* 개별 블록 디자인 */
        .block { 
            width: 35px; height: 35px; border-radius: 6px; cursor: pointer; 
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); 
            transition: transform 0.1s, opacity 0.2s; 
        }
        .block:hover { transform: scale(1.1); z-index: 10; border: 2px solid white; box-sizing: border-box; }
        
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .back-btn:hover { background: #95a5a6; }
    </style>
</head>
<body>

    <h1>🖐️ 삼삼오오 블록 깨기</h1>
    <p>같은 색깔이 2개 이상 붙어있는 블록을 클릭해서 모두 없애보세요!</p>

    <div class="header-bar">
        <div class="score-box">점수: <span id="score">0</span></div>
        <button class="restart-btn" onclick="initGame()">다시 시작</button>
    </div>

    <div id="board"></div>

    <a href="index.html" class="back-btn">메인으로 돌아가기</a>

    <script>
        const ROWS = 10;
        const COLS = 15;
        const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6']; // 5가지 색상
        let boardData = [];
        let score = 0;

        // 게임 보드 초기화 및 렌더링
        function initGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            boardData = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    // 무작위 색상 배정 (0~4)
                    row.push(Math.floor(Math.random() * colors.length));
                }
                boardData.push(row);
            }
            drawBoard();
        }

        // 화면에 블록 그리기
        function drawBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = ''; // 기존 블록 지우기

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let block = document.createElement('div');
                    if (boardData[r][c] !== null) {
                        block.className = 'block';
                        block.style.backgroundColor = colors[boardData[r][c]];
                        block.onclick = () => handleBlockClick(r, c);
                    } else {
                        // 터진 빈 공간
                        block.style.width = '35px';
                        block.style.height = '35px';
                    }
                    boardEl.appendChild(block);
                }
            }
        }

        // 블록을 클릭했을 때의 처리
        function handleBlockClick(row, col) {
            const color = boardData[row][col];
            if (color === null) return;

            // 붙어있는 같은 색깔 블록 찾기
            let group = [];
            let visited = Array(ROWS).fill(false).map(() => Array(COLS).fill(false));
            
            function findConnected(r, c) {
                if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
                if (visited[r][c] || boardData[r][c] !== color) return;
                
                visited[r][c] = true;
                group.push({r, c});
                
                // 상하좌우 검사
                findConnected(r - 1, c);
                findConnected(r + 1, c);
                findConnected(r, c - 1);
                findConnected(r, c + 1);
            }

            findConnected(row, col);

            // 2개 이상 뭉쳐있을 때만 터짐
            if (group.length >= 2) {
                // 1. 블록 없애기 (점수 계산: 터진 개수의 제곱 * 10)
                score += (group.length * group.length * 10);
                document.getElementById('score').innerText = score;

                group.forEach(b => {
                    boardData[b.r][b.c] = null;
                });

                // 2. 중력 적용 (블록들이 밑으로 떨어짐)
                for (let c = 0; c < COLS; c++) {
                    let emptyRow = ROWS - 1;
                    for (let r = ROWS - 1; r >= 0; r--) {
                        if (boardData[r][c] !== null) {
                            boardData[emptyRow][c] = boardData[r][c];
                            if (emptyRow !== r) boardData[r][c] = null;
                            emptyRow--;
                        }
                    }
                }

                // 3. 빈 줄 당기기 (세로줄이 통째로 비면 오른쪽 줄들이 왼쪽으로 밀착)
                let emptyColIdx = 0;
                for (let c = 0; c < COLS; c++) {
                    let hasBlock = false;
                    for (let r = 0; r < ROWS; r++) {
                        if (boardData[r][c] !== null) { hasBlock = true; break; }
                    }
                    if (hasBlock) {
                        if (emptyColIdx !== c) {
                            for (let r = 0; r < ROWS; r++) {
                                boardData[r][emptyColIdx] = boardData[r][c];
                                boardData[r][c] = null;
                            }
                        }
                        emptyColIdx++;
                    }
                }

                drawBoard(); // 다시 화면 그리기
                checkGameOver();
            }
        }

        function checkGameOver() {
            // 더 이상 터뜨릴 블록(2개 이상 붙은 것)이 있는지 확인
            let isOver = true;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let color = boardData[r][c];
                    if (color !== null) {
                        if (r < ROWS - 1 && boardData[r+1][c] === color) isOver = false;
                        if (c < COLS - 1 && boardData[r][c+1] === color) isOver = false;
                    }
                }
            }
            if (isOver) {
                setTimeout(() => alert("게임 오버! 최종 점수는 " + score + "점 입니다."), 300);
            }
        }

        // 시작할 때 한 번 실행
        initGame();
    </script>
</body>
</html>
