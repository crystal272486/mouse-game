
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드 뒤집기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>카드 맞추기</h1>

<div class="memory">
<div class="card">🍎</div>
<div class="card">🍎</div>
<div class="card">🍌</div>
<div class="card">🍌</div>
</div>

<a href="index.html">← 메인으로</a>

<script>
const cards=document.querySelectorAll(".card");
let first=null;

cards.forEach(card=>{
card.onclick=function(){
card.classList.add("show");

if(!first){
first=card;
}else{
if(first.textContent!==card.textContent){
setTimeout(()=>{
first.classList.remove("show");
card.classList.remove("show");
},500);
}
first=null;
}
}
});
</script>

</body>
</html>
