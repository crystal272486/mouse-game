<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>스피드 클릭 - forever.or.kr</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #fdfbfb; text-align: center; margin: 0; padding: 20px; color: #333; }
        h1 { color: #2c3e50; }
        
        .info-panel { display: flex; justify-content: center; gap: 30px; font-size: 1.5em; font-weight: bold; margin-bottom: 20px; }
        #time { color: #e74c3c; }
        #score { color: #2980b9; }

        #gameArea { position: relative; width: 600px; height: 400px; background: #ecf0f1; border: 4px solid #bdc3c7; margin: 0 auto; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: crosshair; }
        
        /* 클릭할 과녁 모양 */
        #target { position: absolute; width: 50px; height: 50px; background: radial-gradient(circle, red 20%, white 25%, white 40%, red 45%); border-radius: 50%; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; }
        #target:active { transform: scale(0.8); } /* 클릭 시 움찔하는 효과 */

        #startBtn { padding: 15px 30px; font-size: 1.2em; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s; }
        #startBtn:hover { background: #27ae60; transform: translateY(-2px); }

        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #7f8c8d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .back-btn:hover { background: #95a5a6; }
    </style>
</head>
<body>

    <h1>🚀 스피드 클릭 연습</h1>
    <p>30초 동안 나타나는 과녁을 최대한 빨리 클릭하세요!</p>

    <div class="info-panel">
        <div id="time">남은 시간: 30초</div>
        <div id="score">점수: 0점</div>
    </div>

    <button id="startBtn" onclick="startGame()">게임 시작하기</button>

    <div id="gameArea">
        <div id="target" onmousedown="hitTarget()"></div>
    </div>

    <a href="index.html" class="back-btn">메인으로 돌아가기</a>

    <script>
        let score = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let timer;
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        const gameArea = document.getElementById('gameArea');

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            timeLeft = 30;
            scoreDisplay.innerText = "점수: 0점";
            timeDisplay.innerText = "남은 시간: 30초";
            startBtn.style.display = 'none'; // 시작 버튼 숨기기
            
            moveTarget();
            
            timer = setInterval(() => {
                timeLeft--;
                timeDisplay.innerText = `남은 시간: ${timeLeft}초`;
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        function hitTarget() {
            if (!isPlaying) return;
            score++;
            scoreDisplay.innerText = `점수: ${score}점`;
            moveTarget();
        }

        function moveTarget() {
            // 과녁이 게임 화면 밖으로 나가지 않도록 좌표 계산 (화면 600x400, 과녁 50x50)
            const maxX = 600 - 50;
            const maxY = 400 - 50;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            target.style.left = randomX + 'px';
            target.style.top = randomY + 'px';
            target.style.display = 'block';
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(timer);
            target.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.innerText = "다시 시작하기";
            setTimeout(() => alert(`⏰ 시간 종료!\n최종 점수는 ${score}점 입니다!`), 100);
        }
    </script>
</body>
</html>
